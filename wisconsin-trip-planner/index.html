<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wisconsin Road Trip Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="page-bg"></div>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="badge">🚗</div>
        <div>
          <h1>Wisconsin Road Trip</h1>
          <p>July 2–5 • York, PA → Saukville, WI</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="loginBtn" class="pill">Google Login</button>
        <button id="logoutBtn" class="pill ghost hidden">Logout</button>
        <button id="saveCloudBtn" class="pill glow">Save / Sync</button>
      </div>
    </header>

    <section class="hero-card">
      <div>
        <p class="kicker">Simple. Visual. Not corporate.</p>
        <h2>Plan the ride hour-by-hour without fighting a spreadsheet.</h2>
        <p id="authStatus" class="status">Local save is active. Google sync is ready when Supabase auth is configured.</p>
      </div>
      <div class="route-box">
        <label>From<input id="origin" value="700 Fireside Rd, York, PA" /></label>
        <label>To<input id="destination" value="Saukville, WI" /></label>
        <div class="mini-actions">
          <button id="mapsBtn">Open Google Route</button>
          <button id="printBtn" class="ghost">Print / PDF</button>
        </div>
      </div>
    </section>

    <section class="quick-add">
      <select id="slotDay"></select>
      <input id="slotStart" type="time" value="09:00" />
      <input id="slotEnd" type="time" value="10:00" />
      <input id="slotTitle" placeholder="What are we doing?" />
      <input id="slotLocation" placeholder="Where / link?" />
      <button id="addSlotBtn">+ Add</button>
    </section>

    <nav id="dayTabs" class="day-tabs"></nav>

    <section class="trip-overview">
      <div class="stat"><span id="totalSlots">0</span><small>planned blocks</small></div>
      <div class="stat"><span>4</span><small>trip days</small></div>
      <div class="stat"><span>~11–12h</span><small>drive estimate</small></div>
      <div class="tools">
        <button id="exportBtn" class="ghost">Export</button>
        <label class="file-btn">Import<input id="importFile" type="file" accept="application/json" /></label>
        <button id="resetBtn" class="ghost danger-lite">Reset</button>
      </div>
    </section>

    <section id="planner" class="planner"></section>
  </main>

  <dialog id="editDialog">
    <form method="dialog" class="modal">
      <input id="editId" type="hidden" />
      <h2>Edit stop</h2>
      <label>Title<input id="editTitle" /></label>
      <div class="row">
        <label>Start<input id="editStart" type="time" /></label>
        <label>End<input id="editEnd" type="time" /></label>
      </div>
      <label>Location / Link<input id="editLocation" /></label>
      <label>Notes<textarea id="editNotes" rows="4"></textarea></label>
      <div class="modal-actions">
        <button id="deleteSlotBtn" type="button" class="danger">Delete</button>
        <span></span>
        <button value="cancel" class="ghost">Cancel</button>
        <button id="saveEditBtn" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
