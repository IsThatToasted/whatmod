<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noctaire Catalog</title>
<style>
:root{--bg:#07070a;--panel:#111018;--panel2:#17151f;--line:#2d2436;--text:#f5f2ea;--muted:#a8a1b5;--gold:#d4af37;--gold2:#f5d675;--purple:#7c3aed;}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#241333 0,#08070b 34%,#030305 100%);color:var(--text)}
.hero{padding:44px 22px 28px;border-bottom:1px solid rgba(212,175,55,.18);background:linear-gradient(135deg,rgba(124,58,237,.22),rgba(212,175,55,.07),rgba(0,0,0,0))}.wrap{max-width:1260px;margin:auto}.eyebrow{letter-spacing:.22em;text-transform:uppercase;color:var(--gold2);font-size:12px;font-weight:900}.hero h1{font-size:clamp(38px,5.5vw,72px);line-height:.95;margin:10px 0 14px}.sub{color:var(--muted);max-width:760px;font-size:16px;line-height:1.45}.toolbar{position:sticky;top:0;z-index:10;background:rgba(7,7,10,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 22px}.bar{max-width:1260px;margin:auto;display:flex;gap:12px;flex-wrap:wrap;align-items:center}.search,select{padding:14px 15px;border-radius:16px;border:1px solid var(--line);background:#0b0a10;color:var(--text);outline:none}.search{min-width:min(460px,100%);flex:1}.count{align-self:center;color:var(--muted);font-size:14px}.categoryRail{max-width:1260px;margin:16px auto 0;display:flex;gap:10px;overflow:auto;padding:2px 0 6px;scrollbar-width:thin}.catBtn{appearance:none;border:1px solid rgba(245,214,117,.2);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.015));color:var(--text);border-radius:999px;padding:12px 16px;font-weight:900;white-space:nowrap;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.18);transition:.15s}.catBtn:hover{border-color:rgba(245,214,117,.6);transform:translateY(-1px)}.catBtn.active{background:linear-gradient(135deg,rgba(212,175,55,.25),rgba(124,58,237,.2));border-color:rgba(245,214,117,.75);color:#fff4c2}.catNum{margin-left:8px;color:var(--gold2);font-size:12px}.grid{max-width:1260px;margin:28px auto;padding:0 22px 70px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:22px}.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border:1px solid rgba(212,175,55,.22);border-radius:24px;overflow:hidden;box-shadow:0 22px 80px rgba(0,0,0,.34);transition:.18s;cursor:pointer;text-align:left;color:var(--text);padding:0}.card:hover{transform:translateY(-4px);border-color:rgba(245,214,117,.58)}.img{height:255px;background:linear-gradient(135deg,#14111d,#07070a);display:flex;align-items:center;justify-content:center;color:var(--muted);position:relative;overflow:hidden}.img:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 62%,rgba(0,0,0,.62));pointer-events:none}.img img{width:100%;height:100%;object-fit:cover;transition:.2s}.card:hover .img img{transform:scale(1.035)}.body{padding:18px}.cat{font-size:11px;font-weight:950;color:var(--gold2);text-transform:uppercase;letter-spacing:.14em}.title{font-size:18px;line-height:1.25;margin:10px 0 14px;min-height:46px}.price{font-size:36px;font-weight:950;letter-spacing:-.04em;color:var(--gold2);text-shadow:0 0 24px rgba(212,175,55,.18)}.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:14px}.pill{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.35);color:#ddd6fe}.link{color:var(--gold2);text-decoration:none;font-weight:850}.empty{max-width:1260px;margin:34px auto;color:var(--muted);padding:0 22px}.footer{border-top:1px solid rgba(255,255,255,.08);color:var(--muted);padding:28px 22px;text-align:center}.dots{position:absolute;left:12px;bottom:12px;display:flex;gap:6px;z-index:2}.dot{width:8px;height:8px;border-radius:999px;background:rgba(245,214,117,.45)}.dot.on{background:var(--gold2)}.photoCount{position:absolute;right:12px;top:12px;z-index:2;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.64);border:1px solid rgba(245,214,117,.36);font-size:12px;color:var(--gold2);font-weight:950}.noPhoto{color:var(--muted);font-weight:800}.modal{position:fixed;inset:0;z-index:30;display:none;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);padding:20px}.modal.open{display:grid;place-items:center}.dialog{width:min(1080px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#15121d,#09080d);border:1px solid rgba(245,214,117,.28);border-radius:28px;box-shadow:0 24px 90px rgba(0,0,0,.6);display:grid;grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr)}.gallery{background:#050509;padding:16px;border-radius:28px 0 0 28px}.mainPhoto{height:min(68vh,650px);border-radius:20px;background:#09080d;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.mainPhoto img{width:100%;height:100%;object-fit:contain}.thumbs{display:flex;gap:10px;overflow:auto;margin-top:12px;padding-bottom:4px}.thumb{width:74px;height:74px;flex:0 0 auto;border-radius:13px;object-fit:cover;border:2px solid transparent;background:#09080d;cursor:pointer}.thumb.active{border-color:var(--gold2)}.details{padding:26px}.close{float:right;border:0;background:rgba(255,255,255,.07);color:var(--text);border-radius:999px;width:38px;height:38px;font-size:22px;cursor:pointer}.modalTitle{font-size:28px;line-height:1.08;margin:24px 0 14px}.modalPrice{font-size:44px;font-weight:950;color:var(--gold2);margin:18px 0}.modalNotes{color:var(--muted);line-height:1.45}.ctaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.cta{display:inline-block;text-decoration:none;border-radius:999px;padding:12px 16px;font-weight:900;background:var(--purple);color:#fff}.ghost{background:rgba(212,175,55,.16);color:var(--gold2);border:1px solid rgba(212,175,55,.34)}
@media(max-width:760px){.toolbar{padding:12px}.bar{gap:9px}.search{min-width:100%}.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));padding:0 12px 44px;gap:14px}.img{height:205px}.body{padding:14px}.price{font-size:29px}.title{font-size:16px}.hero{padding:34px 16px 22px}.dialog{grid-template-columns:1fr}.gallery{border-radius:28px 28px 0 0}.mainPhoto{height:420px}.modal{padding:10px}}
</style></head>
<body>
<header class="hero"><div class="wrap"><div class="eyebrow">Curated Inventory</div><h1>Noctaire Catalog</h1><p class="sub">Browse a private-sale style catalog with large item photos, clean storefront names, category filters, and current desired sell prices.</p></div></header>
<section class="toolbar"><div class="bar"><input id="q" class="search" placeholder="Search products..."><select id="sort"><option value="az">Sort A-Z</option><option value="priceHigh">Price High</option><option value="priceLow">Price Low</option></select><div id="count" class="count"></div></div><div id="categoryRail" class="categoryRail"></div></section>
<main id="grid" class="grid"></main><div id="empty" class="empty" style="display:none">No matching items.</div><footer class="footer">Catalog generated by Whatnot Inventory Manager</footer>
<div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="dialog"><div class="gallery"><div id="mainPhoto" class="mainPhoto"></div><div id="thumbs" class="thumbs"></div></div><div class="details"><button class="close" onclick="closeModal()">×</button><div id="mCat" class="cat"></div><h2 id="mTitle" class="modalTitle"></h2><div id="mPrice" class="modalPrice"></div><p id="mNotes" class="modalNotes"></p><div class="ctaRow"><a id="mLink" class="cta" target="_blank" rel="noopener">View Listing</a><button class="cta ghost" onclick="closeModal()">Keep Browsing</button></div></div></div></div>
<script>
let products=[];let currentCat='All';let activeProduct=null;let activePhoto=0;
const preferredCats=['Knives','Bags','Accessories','Fragrances','BB3/Labubu','Other'];
fetch('products.json').then(r=>r.json()).then(d=>{products=d;init();}).catch(()=>{grid.innerHTML='<p>Could not load products.json</p>'});
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function catCounts(){const counts={All:products.length};products.forEach(p=>{const c=p.category||'Other';counts[c]=(counts[c]||0)+1});return counts}
function init(){q.oninput=render;sort.onchange=render;buildCategoryButtons();render()}
function buildCategoryButtons(){const counts=catCounts();const found=[...new Set(products.map(p=>p.category||'Other'))];const cats=['All'].concat(preferredCats.filter(c=>found.includes(c))).concat(found.filter(c=>!preferredCats.includes(c)).sort());categoryRail.innerHTML=cats.map(c=>`<button class="catBtn ${c===currentCat?'active':''}" onclick="setCat('${esc(c).replace(/'/g,'&#39;')}')">${esc(c)}<span class="catNum">${counts[c]||0}</span></button>`).join('')}
function setCat(c){currentCat=c;buildCategoryButtons();render()}
function normalizePhotoSrc(src){src=String(src||'').trim();if(!src)return '';if(/^https?:\/\//i.test(src)||src.startsWith('assets/')||src.startsWith('data:'))return src;if(src.includes('/')||src.includes('\\'))return src;return 'assets/'+src}
function getPhotos(p){return (p.photos&&p.photos.length?p.photos:(p.photo?[p.photo]:[])).map(normalizePhotoSrc).filter(Boolean)}
function photoHtml(p){const photos=getPhotos(p);if(!photos.length)return '<span class="noPhoto">No Photo</span>';const dots=photos.length>1?`<div class="dots">${photos.slice(0,6).map((_,i)=>`<span class="dot ${i===0?'on':''}"></span>`).join('')}</div><span class="photoCount">${photos.length} photos</span>`:'';return `<img src="${esc(photos[0])}" alt="${esc(p.title)}" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=&quot;noPhoto&quot;>No Photo</span>';">${dots}`}
function render(){const s=q.value.toLowerCase(), c=currentCat;let list=products.filter(p=>(c==='All'||(p.category||'Other')===c)&&(`${p.title||''} ${p.category||''} ${p.notes||''}`.toLowerCase().includes(s)));if(sort.value==='priceHigh')list.sort((a,b)=>(b.price||0)-(a.price||0));else if(sort.value==='priceLow')list.sort((a,b)=>(a.price||0)-(b.price||0));else list.sort((a,b)=>String(a.title||'').localeCompare(String(b.title||'')));count.textContent=list.length+' item'+(list.length===1?'':'s');empty.style.display=list.length?'none':'block';grid.innerHTML=list.map(p=>`<button class="card" onclick="openModal(${p.id})"><div class="img">${photoHtml(p)}</div><div class="body"><div class="cat">${esc(p.category||'Other')}</div><h2 class="title">${esc(p.title)}</h2><div class="price">${money(p.price)}</div><div class="meta"><span class="pill">${esc(p.status||'Available')}</span><span class="link">View details</span></div></div></button>`).join('')}
function openModal(id){activeProduct=products.find(p=>p.id===id);activePhoto=0;if(!activeProduct)return;modal.classList.add('open');document.body.style.overflow='hidden';paintModal()}
function closeModal(){modal.classList.remove('open');document.body.style.overflow=''}
function paintModal(){const p=activeProduct, photos=getPhotos(p);mCat.textContent=p.category||'Other';mTitle.textContent=p.title||'';mPrice.textContent=money(p.price);mNotes.textContent=p.notes||'Message seller to claim or ask questions about this item.';mLink.style.display=p.listingUrl?'inline-block':'none';mLink.href=p.listingUrl||'#';if(!photos.length){mainPhoto.innerHTML='<span class="noPhoto">No Photo</span>';thumbs.innerHTML='';return}mainPhoto.innerHTML=`<img src="${esc(photos[activePhoto])}" alt="${esc(p.title)}">`;thumbs.innerHTML=photos.map((src,i)=>`<img class="thumb ${i===activePhoto?'active':''}" src="${esc(src)}" onclick="activePhoto=${i};paintModal()" alt="photo ${i+1}">`).join('')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(!modal.classList.contains('open')||!activeProduct)return;const photos=getPhotos(activeProduct);if(e.key==='ArrowRight'&&photos.length){activePhoto=(activePhoto+1)%photos.length;paintModal()}if(e.key==='ArrowLeft'&&photos.length){activePhoto=(activePhoto-1+photos.length)%photos.length;paintModal()}})
</script></body></html>
