 (no barcode)\nMerged duplicate item #510 (no barcode)\nMerged duplicate item #511 (no barcode)", "stackTotalCost": 20.509999999999998, "pricePoint": "$0-$9 Price Point", "pricePointLabel": "$0-$9 Price Point", "pricePointSort": 0, "pricePointStep": 10, "pricePointMin": 0, "pricePointMax": 9}];let currentCat='All';let activeProduct=null;let activePhoto=0;
const preferredCats=['Knives','Bags','Patches','Accessories','Fragrances','BB3/Labubu','Blind Boxes','Other'];
if(products && products.length){init();}else{fetch('products.json').then(r=>r.json()).then(d=>{products=d;init();}).catch(()=>{grid.innerHTML='<p>Could not load products.json</p>';});}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function catCounts(){const counts={All:products.length};products.forEach(p=>{const c=p.category||'Other';counts[c]=(counts[c]||0)+1});return counts}
function init(){q.oninput=render;sort.onchange=render;buildCategoryButtons();render()}
function buildCategoryButtons(){const counts=catCounts();const found=[...new Set(products.map(p=>p.category||'Other'))];const cats=['All'].concat(preferredCats.filter(c=>found.includes(c))).concat(found.filter(c=>!preferredCats.includes(c)).sort());categoryRail.innerHTML=cats.map(c=>`<button class="catBtn ${c===currentCat?'active':''}" onclick="setCat('${esc(c).replace(/'/g,'&#39;')}')">${esc(c)}<span class="catNum">${counts[c]||0}</span></button>`).join('')}
function setCat(c){currentCat=c;buildCategoryButtons();render()}
function normalizePhotoSrc(src){src=String(src||'').trim();if(!src)return '';if(/^https?:\/\//i.test(src)||src.startsWith('assets/')||src.startsWith('data:'))return src;if(src.includes('/')||src.includes('\\'))return src;return 'assets/'+src}
function getPhotos(p){return (p.photos&&p.photos.length?p.photos:(p.photo?[p.photo]:[])).map(normalizePhotoSrc).filter(Boolean)}
function photoHtml(p){const photos=getPhotos(p);if(!photos.length)return '<span class="noPhoto">No Photo</span>';const dots=photos.length>1?`<div class="dots">${photos.slice(0,6).map((_,i)=>`<span class="dot ${i===0?'on':''}"></span>`).join('')}</div><span class="photoCount">${photos.length} photos</span>`:'';return `<img src="${esc(photos[0])}" alt="${esc(p.title)}" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=&quot;noPhoto&quot;>No Photo</span>';">${dots}`}
function knifeSpecValues(p){return [p.handleMaterial,p.bladeSteel,p.bladeType,p.bladeGrind,p.lockType,p.reversiblePocketClip].filter(x=>String(x||'').trim())}
function pricePointLabel(p){return p.pricePointLabel||p.pricePoint||money(p.price)+' Price Point'}
function pricePointSort(p){return Number(p.pricePointSort ?? p.price ?? 0)}
function render(){const raw=q.value.trim();const match=products.find(p=>String(p.barcode||'').toLowerCase()===raw.toLowerCase()&&raw);if(match&&!modal.classList.contains('open')){openModal(match.id);}const s=raw.toLowerCase(), c=currentCat;let list=products.filter(p=>(c==='All'||(p.category||'Other')===c)&&(`${p.title||''} ${p.category||''} ${p.notes||''} ${p.description||''} ${p.specs||''} ${p.barcode||''} ${p.bladeSteel||''} ${p.lockType||''} ${p.handleMaterial||''} ${p.bladeType||''} ${p.bladeGrind||''} ${p.reversiblePocketClip||''}`.toLowerCase().includes(s)));if(sort.value==='priceHigh')list.sort((a,b)=>pricePointSort(b)-pricePointSort(a)||(b.price||0)-(a.price||0)||String(a.title||'').localeCompare(String(b.title||'')));else if(sort.value==='priceLow')list.sort((a,b)=>pricePointSort(a)-pricePointSort(b)||(a.price||0)-(b.price||0)||String(a.title||'').localeCompare(String(b.title||'')));else list.sort((a,b)=>pricePointSort(a)-pricePointSort(b)||(a.price||0)-(b.price||0)||String(a.title||'').localeCompare(String(b.title||'')));count.textContent=list.length+' item'+(list.length===1?'':'s');empty.style.display=list.length?'none':'block';let html='';let lastPoint=null;for(const p of list){const qty=Number(p.inventoryCount||p.quantity||1);const stock=qty>1?`<span class="stock">${qty} in stock</span>`:'<span class="stock">1 in stock</span>';const point=pricePointLabel(p);if(point!==lastPoint){const countAtPoint=list.filter(x=>pricePointLabel(x)===point).reduce((n,x)=>n+Number(x.inventoryCount||x.quantity||1),0);html+=`<div class="pricePointHeader">${esc(point)} · ${countAtPoint} unit${countAtPoint===1?'':'s'}</div>`;lastPoint=point;}const chips=knifeSpecValues(p).slice(0,4).map(x=>`<span class="knifeChip">${esc(x)}</span>`).join('');html+=`<button class="card" onclick="openModal(${p.id})"><div class="img">${photoHtml(p)}</div><div class="body"><div class="cat">${esc(p.category||'Other')}</div><h2 class="title">${esc(p.title)}</h2>${chips?`<div class="knifeChips">${chips}</div>`:''}<div class="price">${money(p.price)}</div><div class="meta"><span class="pill">${esc(p.status||'Available')}</span>${stock}<span class="link">View details</span></div></div></button>`}grid.innerHTML=html}
function openModal(id){activeProduct=products.find(p=>p.id===id);activePhoto=0;if(!activeProduct)return;modal.classList.add('open');document.body.style.overflow='hidden';paintModal()}
function closeModal(){modal.classList.remove('open');document.body.style.overflow='';activeProduct=null;activePhoto=0;if(q){render();}}
function openBarcode(code){
  const clean=String(code||'').trim();
  if(!clean)return false;
  const found=products.find(p=>String(p.barcode||'').trim().toLowerCase()===clean.toLowerCase());
  if(!found)return false;
  // Preserve the user's search text; never clear it unless they manually clear it.
  currentCat='All';
  buildCategoryButtons();
  openModal(found.id);
  return true;
}
let scanBuffer='',scanTimer=null,scanLast=0;
function resetScanBuffer(){scanBuffer='';scanLast=0;if(scanTimer){clearTimeout(scanTimer);scanTimer=null;}}
function flushScanBuffer(){const code=scanBuffer;resetScanBuffer();if(code.length>=4)openBarcode(code);}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const now=Date.now();
  if(e.key==='Enter'){
    if(scanBuffer.length>=4){e.preventDefault();flushScanBuffer();}
    return;
  }
  if(e.key.length!==1)return;
  // Barcode scanners type much faster than humans. Capture quick bursts globally so scanning works
  // while a product modal is open, the page is focused elsewhere, or the search box is not active.
  if(scanBuffer && now-scanLast>95)scanBuffer='';
  scanBuffer+=e.key;
  scanLast=now;
  if(scanTimer)clearTimeout(scanTimer);
  scanTimer=setTimeout(()=>{if(scanBuffer.length>=8)flushScanBuffer();else resetScanBuffer();},180);
},true);

function setInfoTab(which){descTab.classList.toggle('active',which==='desc');specsTab.classList.toggle('active',which==='specs');mDesc.classList.toggle('active',which==='desc');mSpecs.classList.toggle('active',which==='specs')}
function knifeSpecsHtml(p){const rows=[];if((p.handleMaterial||'').trim())rows.push(['Handle Material',p.handleMaterial]);if((p.bladeSteel||'').trim())rows.push(['Blade Steel',p.bladeSteel]);if((p.bladeType||'').trim())rows.push(['Blade Type',p.bladeType]);if((p.bladeGrind||'').trim())rows.push(['Blade Grind',p.bladeGrind]);if((p.lockType||'').trim())rows.push(['Lock Type',p.lockType]);if((p.reversiblePocketClip||'').trim())rows.push(['Reversible Pocket Clip',p.reversiblePocketClip]);return rows.length?'<table class="specTable">'+rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join('')+'</table>':''}
function specsHtml(txt){txt=String(txt||'').trim();if(!txt)return '<span class="noPhoto">No specs added.</span>';const lines=txt.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);let rows=[];for(let i=0;i<lines.length;i++){let line=lines[i];let m=line.match(/^(.+?)\s*[:\t]\s*(.+)$/);if(m){rows.push([m[1],m[2]]);continue;}if(i+1<lines.length&&!/[:\t]/.test(line)){rows.push([line,lines[i+1]]);i++;continue;}rows.push(['',line]);}return '<table class="specTable">'+rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join('')+'</table>'}
function paintModal(){const p=activeProduct, photos=getPhotos(p);const qty=Number(p.inventoryCount||p.quantity||1);mCat.textContent=p.category||'Other';mTitle.textContent=p.title||'';mPrice.textContent=money(p.price);mStock.textContent=qty+' in stock';mDesc.textContent=(p.description||p.notes||'Message seller to claim or ask questions about this item.');mSpecs.innerHTML=(knifeSpecsHtml(p)||'') + (knifeSpecsHtml(p)&&String(p.specs||'').trim()?'<br>':'') + specsHtml(p.specs||'');setInfoTab('desc');mLink.style.display=p.listingUrl?'inline-block':'none';mLink.href=p.listingUrl||'#';if(!photos.length){mainPhoto.innerHTML='<span class="noPhoto">No Photo</span>';thumbs.innerHTML='';return}mainPhoto.innerHTML=`<img src="${esc(photos[activePhoto])}" alt="${esc(p.title)}">`;thumbs.innerHTML=photos.map((src,i)=>`<img class="thumb ${i===activePhoto?'active':''}" src="${esc(src)}" onclick="activePhoto=${i};paintModal()" alt="photo ${i+1}">`).join('')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(!modal.classList.contains('open')||!activeProduct)return;const photos=getPhotos(activeProduct);if(e.key==='ArrowRight'&&photos.length){activePhoto=(activePhoto+1)%photos.length;paintModal()}if(e.key==='ArrowLeft'&&photos.length){activePhoto=(activePhoto-1+photos.length)%photos.length;paintModal()}})
let touchStartX=0,touchStartY=0;
mainPhoto.addEventListener('touchstart',e=>{const t=e.changedTouches[0];touchStartX=t.clientX;touchStartY=t.clientY;},{passive:true});
mainPhoto.addEventListener('touchend',e=>{if(!activeProduct)return;const photos=getPhotos(activeProduct);if(photos.length<2)return;const t=e.changedTouches[0];const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)){activePhoto=dx<0?(activePhoto+1)%photos.length:(activePhoto-1+photos.length)%photos.length;paintModal();}}, {passive:true});
