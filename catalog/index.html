<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noctaire Catalog</title>
<style>
:root{--bg:#07070a;--panel:#111018;--panel2:#17151f;--line:#2d2436;--text:#f5f2ea;--muted:#a8a1b5;--gold:#d4af37;--gold2:#f5d675;--purple:#7c3aed;}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#241333 0,#07070a 34%,#030305 100%);color:var(--text)}
.hero{padding:44px 22px 28px;border-bottom:1px solid rgba(212,175,55,.22);background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(212,175,55,.08),rgba(0,0,0,0))}
.wrap{max-width:1240px;margin:auto}.eyebrow{letter-spacing:.22em;text-transform:uppercase;color:var(--gold2);font-size:12px;font-weight:800}.hero h1{font-size:clamp(34px,5vw,68px);line-height:.95;margin:10px 0 14px}.sub{color:var(--muted);max-width:740px;font-size:16px}.toolbar{position:sticky;top:0;z-index:10;background:rgba(7,7,10,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 22px}.bar{max-width:1240px;margin:auto;display:flex;gap:12px;flex-wrap:wrap}.search,select{padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:#0b0a10;color:var(--text);outline:none}.search{min-width:min(420px,100%);flex:1}.count{align-self:center;color:var(--muted);font-size:14px}.grid{max-width:1240px;margin:28px auto;padding:0 22px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:20px}.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border:1px solid rgba(212,175,55,.22);border-radius:22px;overflow:hidden;box-shadow:0 22px 80px rgba(0,0,0,.32);transition:.18s ease}.card:hover{transform:translateY(-3px);border-color:rgba(245,214,117,.55)}.img{height:240px;background:linear-gradient(135deg,#14111d,#07070a);display:flex;align-items:center;justify-content:center;color:var(--muted);position:relative}.img:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55))}.img img{width:100%;height:100%;object-fit:cover}.body{padding:17px}.cat{font-size:11px;font-weight:900;color:var(--gold2);text-transform:uppercase;letter-spacing:.14em}.title{font-size:17px;line-height:1.25;margin:10px 0 14px;min-height:44px}.price{font-size:34px;font-weight:950;letter-spacing:-.04em;color:var(--gold2);text-shadow:0 0 24px rgba(212,175,55,.18)}.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:14px}.pill{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.35);color:#ddd6fe}.link{color:var(--gold2);text-decoration:none;font-weight:800}.empty{max-width:1240px;margin:34px auto;color:var(--muted);padding:0 22px}.footer{border-top:1px solid rgba(255,255,255,.08);color:var(--muted);padding:28px 22px;text-align:center}
</style></head>
<body>
<header class="hero"><div class="wrap"><div class="eyebrow">Curated Inventory</div><h1>Noctaire Catalog</h1><p class="sub">A private-sale style catalog generated from tracked inventory. Prices reflect the current desired sell price for each item.</p></div></header>
<section class="toolbar"><div class="bar"><input id="q" class="search" placeholder="Search items, categories, notes..."><select id="cat"><option>All</option></select><select id="sort"><option value="az">Sort A-Z</option><option value="priceHigh">Price High</option><option value="priceLow">Price Low</option></select><div id="count" class="count"></div></div></section>
<main id="grid" class="grid"></main><div id="empty" class="empty" style="display:none">No matching items.</div><footer class="footer">Catalog generated by Whatnot Inventory Manager</footer>
<script>
let products=[];
fetch('products.json').then(r=>r.json()).then(d=>{products=d;init();}).catch(()=>{grid.innerHTML='<p>Could not load products.json</p>'});
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function init(){const cats=[...new Set(products.map(p=>p.category||'Other'))].sort();cat.innerHTML='<option>All</option>'+cats.map(c=>`<option>${esc(c)}</option>`).join('');q.oninput=render;cat.onchange=render;sort.onchange=render;render()}
function render(){const s=q.value.toLowerCase(), c=cat.value;let list=products.filter(p=>(c==='All'||(p.category||'Other')===c)&&(`${p.title||''} ${p.category||''} ${p.notes||''}`.toLowerCase().includes(s)));if(sort.value==='priceHigh')list.sort((a,b)=>(b.price||0)-(a.price||0));else if(sort.value==='priceLow')list.sort((a,b)=>(a.price||0)-(b.price||0));else list.sort((a,b)=>String(a.title||'').localeCompare(String(b.title||'')));count.textContent=list.length+' item'+(list.length===1?'':'s');empty.style.display=list.length?'none':'block';grid.innerHTML=list.map(p=>`<article class="card"><div class="img">${p.photo?`<img src="${esc(p.photo)}" alt="${esc(p.title)}">`:'No Photo'}</div><div class="body"><div class="cat">${esc(p.category||'Other')}</div><h2 class="title">${esc(p.title)}</h2><div class="price">${money(p.price)}</div><div class="meta"><span class="pill">${esc(p.status||'Available')}</span>${p.listingUrl?`<a class="link" href="${esc(p.listingUrl)}" target="_blank" rel="noopener">View</a>`:''}</div></div></article>`).join('')}
</script></body></html>
