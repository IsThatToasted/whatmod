name: Build WeTrack Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App artifact name'
        required: false
        default: 'WeTrack'
      bundle_id:
        description: 'Bundle identifier used for the unsigned build. Sideloadly can resign it locally.'
        required: false
        default: 'com.whatmod.wetrack'

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA for Sideloadly
    runs-on: macos-15
    env:
      PROJECT_PATH: track/ios/WeTrack/WeTrack.xcodeproj
      SCHEME: WeTrack
      CONFIGURATION: Release
      DERIVED_DATA: build/DerivedData
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate project path
        run: |
          if [ ! -d "$PROJECT_PATH" ]; then
            echo "Could not find Xcode project at: $PROJECT_PATH"
            echo "This workflow expects the iOS wrapper to live at track/ios/WeTrack/."
            echo "If your repo layout is different, edit PROJECT_PATH in this workflow."
            exit 1
          fi

      - name: Build unsigned iPhone app
        run: |
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ github.event.inputs.bundle_id }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/${CONFIGURATION}-iphoneos" -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found. Build output:"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 -type d || true
            exit 1
          fi

          rm -rf build/Payload build/ipa
          mkdir -p build/Payload build/ipa
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry "ipa/${{ github.event.inputs.app_name }}-unsigned.ipa" Payload)
          echo "Created unsigned IPA: build/ipa/${{ github.event.inputs.app_name }}-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-unsigned-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error

      - name: Upload raw .app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-app-bundle
          path: build/Payload/*.app
          if-no-files-found: warn
